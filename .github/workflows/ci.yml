name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  portable-platforms:
    name: Portable ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
          - x86_64-unknown-freebsd
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - aarch64-linux-android
          - aarch64-apple-ios
          - wasm32-unknown-unknown
          - thumbv7em-none-eabihf

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install target
        run: rustup target add "${{ matrix.target }}"

      - name: Check portable crates
        run: scripts/check_platform_matrix.sh --portable "${{ matrix.target }}"

  native-platforms:
    name: Native transport ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15
          - macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check native workspace and transport
        shell: bash
        run: scripts/check_platform_matrix.sh --native

  compatibility:
    name: Rust ${{ matrix.rust }} compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        rust:
          - 1.90.0
          - 1.91.0
          - 1.92.0
          - 1.93.0
          - 1.94.0
          - 1.95.0
          - 1.96.0
          - 1.96.1
          - 1.97.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust ${{ matrix.rust }}
        run: rustup toolchain install "${{ matrix.rust }}" --profile minimal

      - name: Check supported compiler
        run: scripts/check_rust_version_matrix.sh "${{ matrix.rust }}"

  checks:
    name: Format, lint, test, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show

      - name: Install security tools
        run: |
          cargo install --locked cargo-deny --version 0.20.2
          cargo install --locked cargo-audit --version 0.22.2

      - name: Install SBOM tool
        run: cargo install --locked cargo-sbom --version 0.10.0

      - name: Run local check gate
        run: scripts/checks.sh

      - name: Check dependency policy
        run: |
          cargo deny check
          cargo deny --manifest-path tests/reqwest-feature-unification/Cargo.toml \
            --config deny.toml --locked check advisories licenses sources

      - name: Check RustSec advisories
        run: |
          cargo audit
          cargo audit --no-fetch \
            --file tests/reqwest-feature-unification/Cargo.lock

      - name: Check committed SBOM freshness
        run: scripts/check_sbom_freshness.sh
