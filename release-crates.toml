[release]
version = "0.10.0"
policy = "independent"

[crates."cloud-sdk"]
previous_version = "0.9.0"
version = "0.10.0"
change = "metadata"
publish = true
reason = "Release metadata, current Rust tooling, README updates, and v0.10.0 release evidence for the provider-neutral facade."

[crates."cloud-sdk-hetzner"]
previous_version = "0.9.0"
version = "0.10.0"
change = "code"
publish = true
reason = "No_std Firewall and Network request domains with canonical CIDR, route, subnet, and rule validation."

[crates."cloud-sdk-hetzner-reqwest"]
previous_version = "0.9.0"
version = "0.10.0"
change = "metadata"
publish = true
reason = "Keep optional transport boundary metadata aligned with v0.10.0 release evidence."

[crates."cloud-sdk-hetzner-sanitization"]
previous_version = "0.9.0"
version = "0.10.0"
change = "metadata"
publish = true
reason = "Keep sanitization boundary metadata aligned with v0.10.0 release evidence."

[crates."cloud-sdk-hetzner-testkit"]
previous_version = "0.9.0"
version = "0.10.0"
change = "metadata"
publish = true
reason = "Keep testkit boundary metadata aligned with v0.10.0 release evidence."
