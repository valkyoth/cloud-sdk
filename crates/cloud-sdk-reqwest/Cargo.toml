[package]
name = "cloud-sdk-reqwest"
description = "Optional provider-neutral reqwest transport boundary for cloud-sdk."
version = "0.14.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[features]
default = []
std = ["cloud-sdk/std", "cloud-sdk-sanitization?/std"]
blocking-rustls = [
    "std",
    "dep:cloud-sdk-sanitization",
    "dep:reqwest",
    "reqwest/blocking",
    "reqwest/rustls",
]
async-rustls = [
    "std",
    "dep:bytes",
    "dep:cloud-sdk-sanitization",
    "dep:reqwest",
    "reqwest/rustls",
]

[dependencies]
bytes = { workspace = true, optional = true }
cloud-sdk.workspace = true
cloud-sdk-sanitization = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "time"] }

[lints]
workspace = true
