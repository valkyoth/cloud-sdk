[package]
name = "cloud-sdk-reqwest"
description = "Optional provider-neutral reqwest transport boundary for cloud-sdk."
version = "0.13.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[features]
default = []
std = ["cloud-sdk/std", "cloud-sdk-sanitization?/std"]
blocking-rustls = [
    "std",
    "dep:cloud-sdk-sanitization",
    "dep:reqwest",
    "reqwest/blocking",
    "reqwest/rustls",
]

[dependencies]
cloud-sdk.workspace = true
cloud-sdk-sanitization = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }

[lints]
workspace = true
