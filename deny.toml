# cloud-sdk dependency policy.
#
# This SDK handles cloud infrastructure APIs and must keep dependencies
# deliberate, auditable, and compatible with the no_std core crates.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.95
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"

allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "NCSA",
    "Unicode-3.0",
    "Zlib",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
# rustls-platform-verifier 0.7 still uses windows-sys 0.52 while Tokio and
# rustls-native-certs use 0.61. Keep this exact reviewed duplicate visible.
skip = [{ name = "windows-sys", version = "0.52.0" }]

[advisories]
db-path = ".cargo-deny-advisory-dbs"
yanked = "deny"
unmaintained = "all"
unsound = "all"
unused-ignored-advisory = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
